# Godot Project Documentation Schema
# This schema MUST be validated before writing any documentation file

schema_version: 1

required_fields:
  module:
    type: string
    description: "Module/area of the project (e.g., 'Battle System', 'World Map', 'UI')"
    examples:
      - "Battle System"
      - "World Map"
      - "Inventory"
      - "UI"

  date:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'
    description: "Date when this problem was solved (YYYY-MM-DD)"

  problem_type:
    type: enum
    values:
      - build_error          # GDScript parse errors, project compilation errors
      - test_failure         # Test failures, flaky tests
      - runtime_error        # Exceptions, crashes during execution
      - performance_issue    # Slow frames, memory issues, draw call problems
      - signal_issue         # Signal connection errors, missing connections, circular signals
      - scene_corruption     # Broken .tscn files, invalid node references, missing dependencies
      - resource_error       # .tres load failures, shared resource mutation, missing preloads
      - untyped_code         # Missing type annotations, unsafe property/method access
      - security_issue       # Authentication, authorization, input validation
      - ui_bug               # UI node layout, theme, Control issues
      - integration_issue    # Plugin, addon, or external tool integration problems
      - logic_error          # Game logic bugs
      - developer_experience # DX issues: workflow, tooling, dev setup
      - workflow_issue       # Development process, missing steps, unclear practices
      - best_practice        # Documenting patterns and practices to follow
      - documentation_gap    # Missing or inadequate documentation
    description: "Primary category of the problem"

  component:
    type: enum
    values:
      - gdscript             # GDScript files, class definitions
      - scene_tree           # Scene structure, node hierarchy
      - resource             # .tres resources, resource loading
      - signal_system        # Signal connections, event bus
      - ui_control           # Control nodes, UI layout
      - physics              # Physics bodies, collision shapes
      - tilemap              # TileMap, TileSet
      - animation            # AnimationPlayer, AnimationTree
      - audio                # AudioStreamPlayer, sound system
      - shader               # Shader files, visual effects
      - autoload             # Autoload singletons, global state
      - plugin               # Editor plugins, addons
      - project_settings     # project.godot, export settings
      - development_workflow # Dev process, tooling
      - testing_framework    # GUT tests, test setup
      - documentation        # Guides, inline docs
      - tooling              # Scripts, generators, CLI tools
    description: "Godot component involved"

  symptoms:
    type: array[string]
    min_items: 1
    max_items: 5
    description: "Observable symptoms (error messages, visual issues, crashes)"
    examples:
      - "Signal not reaching target node after scene change"
      - "Shared resource modified across all instances"
      - "Untyped variable causing runtime error"

  root_cause:
    type: enum
    values:
      - missing_signal_connection  # Signal not connected or wrong target
      - shared_resource_mutation   # Mutating a shared .tres without .duplicate()
      - missing_preload      # Using load() where preload() is needed
      - scene_reference_broken # Invalid node path or missing dependency
      - wrong_api            # Using deprecated/incorrect Godot API
      - type_error           # Missing or wrong type annotation
      - node_order_issue     # Wrong processing order or _ready() timing
      - async_timing         # Coroutine/await timing issue
      - memory_leak          # Memory leak or excessive allocation
      - config_error         # Configuration or project setting issue
      - logic_error          # Algorithm/game logic bug
      - test_isolation       # Test isolation or fixture issue
      - missing_validation   # Missing input validation
      - missing_workflow_step # Skipped or undocumented workflow step
      - inadequate_documentation # Missing or unclear documentation
      - missing_tooling      # Lacking helper scripts or automation
      - incomplete_setup     # Missing project config or setup
    description: "Fundamental cause of the problem"

  resolution_type:
    type: enum
    values:
      - code_fix             # Fixed by changing GDScript source code
      - scene_fix            # Fixed by editing .tscn scene structure
      - resource_fix         # Fixed by editing .tres resource
      - config_change        # Fixed by changing project.godot or settings
      - test_fix             # Fixed by correcting tests
      - addon_update         # Fixed by updating addon/plugin
      - environment_setup    # Fixed by environment configuration
      - workflow_improvement # Improved development workflow or process
      - documentation_update # Added or updated documentation
      - tooling_addition     # Added helper script or automation
    description: "Type of fix applied"

  severity:
    type: enum
    values:
      - critical             # Blocks production or development (build fails, data loss)
      - high                 # Impairs core functionality (feature broken, security issue)
      - medium               # Affects specific feature (UI broken, performance impact)
      - low                  # Minor issue or edge case
    description: "Impact severity"

optional_fields:
  godot_version:
    type: string
    pattern: '^\d+\.\d+(\.\d+)?$'
    description: "Godot version where this was encountered (e.g., '4.6.1')"

  related_components:
    type: array[string]
    description: "Other components that interact with this issue"

  node_types:
    type: array[string]
    description: "Godot node type names involved (for grep retrieval)"
    examples:
      - "CharacterBody2D"
      - "Area2D"
      - "AnimationPlayer"
      - "TileMapLayer"

  tags:
    type: array[string]
    max_items: 8
    description: "Searchable keywords (lowercase, hyphen-separated)"
    examples:
      - "signal-connection"
      - "resource-safety"
      - "scene-corruption"
      - "static-typing"

validation_rules:
  - "module must be a valid project module name"
  - "date must be in YYYY-MM-DD format"
  - "problem_type must match one of the enum values"
  - "component must match one of the enum values"
  - "symptoms must be specific and observable (not vague)"
  - "root_cause must be the ACTUAL cause, not a symptom"
  - "resolution_type must match one of the enum values"
  - "severity must match one of the enum values"
  - "tags should be lowercase, hyphen-separated"

# Example valid front matter:
# ---
# module: Battle System
# date: 2026-03-19
# problem_type: signal_issue
# component: signal_system
# symptoms:
#   - Signal not reaching target node after scene change
#   - Battle actions silently failing
# root_cause: missing_signal_connection
# godot_version: 4.6.1
# resolution_type: code_fix
# severity: high
# tags: [signal-connection, battle, scene-change]
# ---
#
# Example DX issue front matter:
# ---
# module: Development Workflow
# date: 2026-03-19
# problem_type: developer_experience
# component: development_workflow
# symptoms:
#   - gdlint not catching untyped declarations
#   - CI passing with unsafe code
# root_cause: incomplete_setup
# godot_version: 4.6.1
# resolution_type: config_change
# severity: low
# tags: [gdlint, static-typing, dx, workflow]
# ---
